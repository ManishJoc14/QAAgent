services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts/screenshots:/app/artifacts/screenshots
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_QA_API_URL: ${NEXT_PUBLIC_QA_API_URL:-http://localhost:8000/api/qa}
        NEXT_PUBLIC_QA_API_KEY: ${API_AUTH_SECRET}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped